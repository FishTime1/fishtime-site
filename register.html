<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FishTime - Kayıt Ol</title>
  <style>
    body {
      margin: 0;
      background: #08111f;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      width: 100%;
      max-width: 450px;
      background: #0f172a;
      border: 1px solid #1f2937;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
    }
    h1 { margin-top: 0; text-align: center; }
    p { text-align: center; color: #9ca3af; }
    input {
      width: 100%;
      padding: 14px;
      margin-bottom: 12px;
      border-radius: 10px;
      border: 1px solid #243041;
      background: #0b1220;
      color: white;
    }
    button, a.btn {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      background: #2563eb;
      color: white;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      display: block;
      text-align: center;
      margin-top: 10px;
    }
    a.btn { background: #111827; }
    .msg {
      margin-top: 12px;
      color: #93c5fd;
      text-align: center;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Kayıt Ol</h1>
    <p>FishTime hesabını oluştur.</p>

    <input id="email" type="email" placeholder="E-posta" />
    <input id="password" type="password" placeholder="Şifre" />
    <input id="password2" type="password" placeholder="Şifre Tekrar" />

    <button onclick="registerUser()">Kayıt Ol</button>
    <a class="btn" href="login.html">Giriş Sayfasına Git</a>
    <div class="msg" id="msg"></div>
  </div>

  <script>
    const API_BASE = "https://fishtime-api.onrender.com";

    function getDeviceId() {
      let id = localStorage.getItem("fishtime_device_id");
      if (!id) {
        id = "WEB-" + crypto.randomUUID();
        localStorage.setItem("fishtime_device_id", id);
      }
      return id;
    }

    async function registerUser() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const password2 = document.getElementById("password2").value.trim();
      const msg = document.getElementById("msg");
      msg.textContent = "";

      if (!email || !password || !password2) {
        msg.textContent = "Tüm alanları doldur.";
        return;
      }

      if (password !== password2) {
        msg.textContent = "Şifreler aynı değil.";
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/v1/register`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email,
            password,
            device_id: getDeviceId()
          })
        });

        const data = await res.json();

        if (!res.ok) {
          msg.textContent = data.detail || "Kayıt başarısız.";
          return;
        }

        msg.textContent = "Kayıt başarılı. Giriş sayfasına yönlendiriliyorsun...";
        setTimeout(() => {
          window.location.href = "login.html";
        }, 1200);
      } catch (e) {
        msg.textContent = "Sunucuya bağlanılamadı.";
      }
    }
  </script>
</body>
</html>
