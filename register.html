<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FishTime - Kayıt Ol</title>
  <style>
    body {
      margin: 0;
      background: #08111f;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      width: 100%;
      max-width: 450px;
      background: #0f172a;
      border: 1px solid #1f2937;
      border-radius: 16px;
      padding: 28px;
    }
    h1 {
      margin-top: 0;
      margin-bottom: 10px;
      text-align: center;
    }
    p {
      text-align: center;
      color: #9ca3af;
      margin-bottom: 24px;
    }
    input {
      width: 100%;
      padding: 14px;
      margin-bottom: 12px;
      border-radius: 10px;
      border: 1px solid #243041;
      background: #0b1220;
      color: white;
    }
    button, a.btn {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      background: #2563eb;
      color: white;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      display: block;
      text-align: center;
      margin-top: 10px;
    }
    a.link {
      display: block;
      text-align: center;
      margin-top: 16px;
      color: #93c5fd;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Kayıt Ol</h1>
    <p>FishTime hesabınızı oluşturun.</p>

    <input type="email" placeholder="E-posta" />
    <input type="password" placeholder="Şifre" />
    <input type="password" placeholder="Şifre Tekrar" />
    <button>Kayıt Ol</button>

    <a class="btn" href="login.html" style="background:#111827;">Giriş Sayfasına Git</a>
    <a class="link" href="index.html">Ana Sayfaya Dön</a>
  </div>
</body>
</html>
