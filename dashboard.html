<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FishTime Panel</title>

<style>

body{
margin:0;
font-family:Arial;
background:#08111f;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.card{
width:100%;
max-width:700px;
background:#0f172a;
border:1px solid #1f2937;
border-radius:16px;
padding:30px;
box-shadow:0 20px 60px rgba(0,0,0,.35);
}

h1{
text-align:center;
margin-top:0;
font-size:40px;
}

.info{
margin-top:25px;
background:#020617;
padding:20px;
border-radius:10px;
border:1px solid #1f2937;
}

.download{
margin-top:25px;
background:#020617;
padding:20px;
border-radius:10px;
border:1px solid #1f2937;
text-align:center;
}

.download a{
display:block;
background:#58d3ff;
color:white;
text-decoration:none;
padding:16px;
border-radius:10px;
font-weight:bold;
margin-top:15px;
}

.small{
color:#9ca3af;
font-size:14px;
margin-top:8px;
}

button{
width:100%;
padding:14px;
border-radius:10px;
border:none;
background:#58d3ff;
color:white;
font-weight:bold;
cursor:pointer;
font-size:16px;
margin-top:15px;
}

.logout{
margin-top:20px;
background:#ef4444;
}

</style>

</head>

<body>

<div class="card">

<h1>FishTime Panel</h1>

<div class="info">

<h3>Hesap Bilgileri</h3>

<p><b>E-posta:</b> <span id="email"></span></p>
<p><b>Kalan Süre:</b> <span id="remaining"></span></p>

</div>

<div class="download">

<h3>FishTime Uygulaması</h3>

<p>Programı indirip hesabınla giriş yapabilirsin.</p>

<a href="https://drive.google.com/uc?export=download&id=1uhHdvPe5MPldxEgop5QhrJ3_OKiBVlY1" target="_blank">
FishTime İndir
</a>

<div class="small">
Sürüm: v1.0<br>
Dosya Boyutu: 134 MB<br>
Uyumlu Sistem: Windows 10
</div>

</div>

<button class="logout" onclick="logout()">Çıkış Yap</button>

</div>

<script>

const API_BASE="https://fishtime-api.onrender.com";

function logout(){
localStorage.removeItem("token");
window.location.href="login.html";
}

async function loadUser(){

const token=localStorage.getItem("token");

if(!token){
window.location.href="login.html";
return;
}

try{

const res=await fetch(API_BASE+"/v1/me",{
headers:{
Authorization:"Bearer "+token
}
});

if(!res.ok){
logout();
return;
}

const data=await res.json();

document.getElementById("email").innerText=data.email;

if(data.remaining_minutes){

const days=Math.floor(data.remaining_minutes/1440);
const hours=Math.floor((data.remaining_minutes%1440)/60);

document.getElementById("remaining").innerText=days+" gün "+hours+" saat";

}else{

document.getElementById("remaining").innerText="Aktif değil";

}

}catch(e){

console.error(e);
logout();

}

}

loadUser();

</script>

</body>
</html>
