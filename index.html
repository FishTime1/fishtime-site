<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FishTime - Giriş Yap</title>
  <style>
    body {
      margin: 0;
      background: #08111f;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: #0f172a;
      border: 1px solid #1f2937;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
    }

    h1 {
      margin-top: 0;
      text-align: center;
      font-size: 48px;
      margin-bottom: 10px;
    }

    p {
      text-align: center;
      color: #9ca3af;
      margin-bottom: 24px;
      font-size: 16px;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-bottom: 12px;
      border-radius: 10px;
      border: 1px solid #243041;
      background: #0b1220;
      color: white;
      font-size: 16px;
      box-sizing: border-box;
    }

    button,
    a.btn {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      background: #58d3ff;
      color: white;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      display: block;
      text-align: center;
      margin-top: 10px;
      box-sizing: border-box;
      font-size: 16px;
    }

    a.btn {
      background: transparent;
      color: white;
    }

    .msg {
      margin-top: 12px;
      color: #93c5fd;
      text-align: center;
      min-height: 24px;
      white-space: pre-wrap;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Giriş Yap</h1>
    <p>FishTime hesabın ile giriş yap.</p>

    <input id="email" type="email" placeholder="E-posta" />
    <input id="password" type="password" placeholder="Şifre" />

    <button id="loginBtn">Giriş Yap</button>
    <a class="btn" href="register.html">Kayıt Ol</a>

    <div class="msg" id="msg"></div>
  </div>

  <script>
    const API_BASE = "https://fishtime-api.onrender.com";

    function getDeviceId() {
      let id = localStorage.getItem("fishtime_device_id");
      if (!id) {
        id = "WEB-" + Math.random().toString(36).substring(2, 12);
        localStorage.setItem("fishtime_device_id", id);
      }
      return id;
    }

    async function loginUser() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const msg = document.getElementById("msg");

      msg.textContent = "";

      if (!email || !password) {
        msg.textContent = "E-posta ve şifre gerekli.";
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/v1/login`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            email: email,
            password: password,
            device_id: getDeviceId()
          })
        });

        const text = await res.text();
        let data = {};

        try {
          data = JSON.parse(text);
        } catch (e) {
          data = { raw: text };
        }

        if (!res.ok) {
          msg.textContent = data.detail || data.raw || `Giriş başarısız. (${res.status})`;
          return;
        }

        localStorage.setItem("fishtime_token", data.token);
        window.location.href = "dashboard.html";

      } catch (e) {
        console.error("LOGIN ERROR:", e);
        msg.textContent = "Sunucuya bağlanılamadı.\n" + (e.message || e);
      }
    }

    document.getElementById("loginBtn").addEventListener("click", loginUser);
  </script>
</body>
</html>
